# ContextForge production-ready compose stack (task-16.4).
#
# Two-process layout per ADR-016 D3 (Go thin proxy + Rust SoT):
#   * contextforge-core   — Rust data-plane gRPC daemon (port 50551, bind 0.0.0.0)
#   * console-api-serve   — Go control-plane REST (port 48181) → calls
#                            contextforge-core:50551 via --grpc-addr
#
# ADR-018 D1 sticks: fallback deny default. No CONSOLE_API_FALLBACK_INMEM
# injected; if Rust core is unreachable, /v1/health returns 503 +
# docker healthcheck unhealthy (fast operator signal).
#
# Bring up:
#   docker compose -f deploy/docker-compose.production.yml up -d
#
# Image:
#   ghcr.io/${OWNER:-tajiaoyezi}/contextforge-daemon:${CONTEXTFORGE_VERSION:-v0.9.0}
#   (task-16.3 pushes images here on `v*` tag)

services:
  contextforge-core:
    image: ghcr.io/${OWNER:-tajiaoyezi}/contextforge-daemon:${CONTEXTFORGE_VERSION:-v0.9.0}
    command: ["contextforge-core", "0.0.0.0:50551", "/data"]
    environment:
      CONTEXTFORGE_DATA_DIR: /data
      RUST_LOG: ${RUST_LOG:-info}
      # Explicit opt-in for wildcard bind. The Rust daemon refuses 0.0.0.0 by
      # default (dev safety) — set this to "1" inside a container where the
      # docker bridge network isolation makes wildcard bind safe (port 50551
      # is NOT mapped to host; only contextforge-core's container IP is
      # reachable within the compose network).
      CONTEXTFORGE_ALLOW_WILDCARD_BIND: "1"
    volumes:
      - contextforge-data:/data
    healthcheck:
      # gRPC server doesn't expose HTTP; use bash builtin TCP redirect to
      # probe port 50551 (no extra tooling required — debian:bookworm-slim
      # ships /bin/bash by default).
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/50551 && exec 3<&- 3>&-'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    # task-31.2 (ADR-036 D2): resource limits (compose v2 top-level keys — `deploy.resources` only
    # applies under swarm). Defaults are generous for single-host production; override via env.
    mem_limit: ${CORE_MEM_LIMIT:-2g}
    cpus: ${CORE_CPUS:-1.5}

  console-api-serve:
    image: ghcr.io/${OWNER:-tajiaoyezi}/contextforge-daemon:${CONTEXTFORGE_VERSION:-v0.9.0}
    command:
      - contextforge
      - console-api-serve
      - --addr
      - 0.0.0.0:48181
      - --grpc-addr
      - contextforge-core:50551
    environment:
      # ADR-018: NOT injecting CONSOLE_API_FALLBACK_INMEM. Default deny.
      CONTEXTFORGE_CONSOLEAPI_AUTH_TOKEN: ${CONSOLE_API_AUTH_TOKEN:-}
    ports:
      - "${HOST_PORT:-48181}:48181"
    depends_on:
      contextforge-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:48181/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    # task-31.2 (ADR-036 D2): resource limits (env-overridable).
    mem_limit: ${CONSOLE_MEM_LIMIT:-512m}
    cpus: ${CONSOLE_CPUS:-1.0}

  # task-31.2 (ADR-036 D2): OPTIONAL TLS-terminating reverse proxy. NOT started by default — only
  # under `docker compose --profile tls up`, so the existing plaintext deployment is unchanged.
  # Caddy reverse-proxies console-api-serve:48181 and terminates TLS on 443. Real cert issuance needs
  # a real domain + reachable 80/443 (ACME) → [SPEC-DEFER:phase-future.compose-tls-auto-cert]; the
  # Caddyfile below mounts a config dir (operator supplies a domain + cert or enables Caddy's ACME).
  tls-proxy:
    image: caddy:2
    profiles: ["tls"]
    depends_on:
      console-api-serve:
        condition: service_healthy
    ports:
      - "${TLS_HTTPS_PORT:-443}:443"
      - "${TLS_HTTP_PORT:-80}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  contextforge-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
