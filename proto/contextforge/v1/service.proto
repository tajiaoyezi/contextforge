syntax = "proto3";

// FROZEN at schema_version "0.1" — see context.proto CONTRACT FREEZE RULE.
// Internal Go(control-plane) <-> Rust(data-plane) gRPC contract (ADR-001/003).
// Method bodies are OUT OF SCOPE for task-1.1 (contract freeze only).
package contextforge.v1;

import "contextforge/v1/search.proto";
import "contextforge/v1/index.proto";

option go_package = "github.com/tajiaoyezi/contextforge/proto/contextforge/v1;contextforgev1";

message HealthRequest {}

// HealthResponse.status == "SERVING" once contextforge-core is up
// (supports Phase 1 §6 local gRPC health check).
message HealthResponse {
  string status = 1;
}

service ContextService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  // Phase 9 task-9.1: server-streaming indexing RPC (ADR-013 §Decision #1).
  rpc Index(IndexRequest) returns (stream IndexProgress);
  // task-31.3 (ADR-036 D3) add-only: full-text chunk listing for the exporter (real content/hash).
  rpc ListAllChunks(ListAllChunksRequest) returns (ListAllChunksResponse);
}
