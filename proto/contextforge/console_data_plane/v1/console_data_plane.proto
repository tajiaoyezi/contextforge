// ContextForge Console Data Plane gRPC contract (ADR-016 D2).
//
// 1:1 镜像 internal/contractv1/contractv1.go must-have 字段 (snake_case
// JSON tag → snake_case proto field). 与 proto/contextforge/v1/service.proto
// (Phase 9 cli-data-plane Index gRPC) 文件隔离，避免与 Phase 9 already freeze
// Index gRPC 字段冲突 + 让 Console business plane 独立演进。
//
// Refs: ADR-016 §D2 / phase-11-console-real-data-plane.md §6 AC1 /
// task-11.1-rust-data-plane-grpc-services.md §6 AC1
//
// Field naming convention: snake_case (matches Go contractv1 JSON tag);
// Unix epoch i64 for timestamps (Go side converts to *time.Time on egress);
// optional keyword for nullable fields (proto3 synthetic oneof).
//
// Service port: reuses ADR-013 cli-data-plane gRPC :48180 (single Server::builder
// chain in contextforge-core daemon serve entry — both Phase 9 IndexService
// and Phase 11 Console* services coexist).

syntax = "proto3";

package contextforge.console_data_plane.v1;

option go_package = "github.com/tajiaoyezi/contextforge/proto/contextforge/console_data_plane/v1;consoledataplanev1";

// =====================================================================
// Workspace resource (mirrors contractv1.Workspace + WorkspaceCreate)
// =====================================================================

message Workspace {
  string workspace_id = 1;
  string name = 2;
  string root_path = 3;
  string status = 4;             // "ready" | "indexing" | "deleted"
  string config_snapshot = 5;    // JSON-serialized opaque blob (RawMessage 等价)
  repeated string allowlist = 6;
  repeated string denylist = 7;
  int64 created_at_unix = 8;
  int64 updated_at_unix = 9;
}

message CreateWorkspaceRequest {
  string workspace_id = 1;       // Rust 侧需要显式 (Go contractv1 不传则由 handler 生成)
  string name = 2;
  string root_path = 3;
  repeated string allowlist = 4;
  repeated string denylist = 5;
}

message GetWorkspaceRequest {
  string workspace_id = 1;
}

message ListWorkspacesRequest {
  // 预留 future filter (e.g. status filter [SPEC-DEFER:console-endpoint-expansion])
}

message ListWorkspacesResponse {
  repeated Workspace items = 1;
}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}

message DeleteWorkspaceResponse {
  bool ok = 1;
}

// task-12.1 (ADR-017 D1 Wave 1): PATCH /v1/workspaces/{id}/config maps to
// WorkspaceService.UpdateConfig — overwrites allowlist + denylist; SqliteWorkspaceStore
// bumps updated_at_unix. Add-only RPC (ADR-013 D2 / ADR-016 D2 sub).
message UpdateWorkspaceConfigRequest {
  string workspace_id = 1;
  repeated string allowlist = 2;
  repeated string denylist = 3;
}

service WorkspaceService {
  rpc Create(CreateWorkspaceRequest) returns (Workspace);
  rpc Get(GetWorkspaceRequest) returns (Workspace);
  rpc List(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc Delete(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc UpdateConfig(UpdateWorkspaceConfigRequest) returns (Workspace);
}

// =====================================================================
// IndexJob resource (mirrors contractv1.IndexJob)
// =====================================================================

message IndexJob {
  string job_id = 1;
  string workspace_id = 2;
  string trigger_source = 3;
  string status = 4;             // "queued"|"running"|"succeeded"|"failed"|"cancelled"
  string stage = 5;
  int64 processed_files = 6;
  int64 total_files = 7;
  int64 failed_files = 8;
  int64 skipped_files = 9;
  optional string error_message = 10;
  optional int64 started_at_unix = 11;
  optional int64 finished_at_unix = 12;
  optional int64 last_heartbeat_at_unix = 13;
}

message EnqueueJobRequest {
  string workspace_id = 1;
  string trigger_source = 2;
}

message GetJobRequest {
  string job_id = 1;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {
  bool ok = 1;
}

message StreamJobsRequest {
  optional string workspace_id = 1;
}

// task-12.1 (ADR-017 D1 Wave 1): GET /v1/index-jobs?status=active maps to
// JobService.List — empty status_filter returns all non-terminal jobs; future filters
// (workspace_id / since_unix) can be added on this add-only message.
message ListJobsRequest {
  repeated string status_filter = 1;  // queued|running|succeeded|failed|cancelled; empty → all
  optional string workspace_id = 2;   // optional workspace filter
}

message ListJobsResponse {
  repeated IndexJob items = 1;
}

service JobService {
  rpc Enqueue(EnqueueJobRequest) returns (IndexJob);
  rpc Get(GetJobRequest) returns (IndexJob);
  rpc Cancel(CancelJobRequest) returns (CancelJobResponse);
  rpc Stream(StreamJobsRequest) returns (stream IndexJob);
  rpc List(ListJobsRequest) returns (ListJobsResponse);
}

// =====================================================================
// Search (mirrors contractv1.SearchRequest + SearchResult + RetrievalTrace)
// =====================================================================

message SearchRequest {
  string query = 1;
  string workspace_id = 2;
  string agent_scope = 3;
  string retrieval_method = 4;
  int64 top_k = 5;
  string config_snapshot = 6;    // JSON-serialized opaque blob
  // task-20.1 (Phase 20): add-only semantic flag. When true, SearchService.Query
  // runs the opt-in vector/semantic path (mirrors core CoreService.search, task-19.3)
  // instead of BM25. Default false → BM25 (backward-compatible, ADR-015 add-only).
  bool semantic = 7;
  // task-39.1 (Phase 39): add-only hybrid flag. When true, SearchService.Query runs
  // the BM25+vector RRF fusion path (mirrors core CoreService.search hybrid path,
  // server.rs:328-376) instead of semantic-only / BM25. Default false → semantic-only
  // / BM25 (backward-compatible, ADR-015 add-only). parity with v1/search.proto:28.
  bool hybrid = 8;
  // task-42.2 (Phase 42 / ADR-047 D3): add-only source_type filter. Each value is a coarse
  // source_type bucket (code / doc / config / other, derived from file_path by the retriever,
  // task-42.1); the data plane keeps only hits whose source_type matches one of these. Empty →
  // no filtering (backward-compatible, ADR-015 add-only). Parity with v1/search.proto
  // SearchFilters.source_type=1.
  repeated string source_type = 9;
}

message SourceChunk {
  string chunk_id = 1;
  string workspace_id = 2;
  string source_file_path = 3;
  int64 line_start = 4;
  int64 line_end = 5;
  string chunk_text_preview = 6;
  int64 chunk_offset_start = 7;
  int64 chunk_offset_end = 8;
  string redaction_status = 9;
}

message Citation {
  string citation_id = 1;
  string source_file_path = 2;
  string chunk_id = 3;
  int64 line_start = 4;
  int64 line_end = 5;
  double confidence = 6;
}

message SearchResultItem {
  string result_id = 1;
  string query_id = 2;
  string workspace_id = 3;
  string source_file_path = 4;
  string source_file_type = 5;
  string chunk_id = 6;
  string chunk_text_preview = 7;
  int64 line_start = 8;
  int64 line_end = 9;
  double score = 10;
  int64 rank_before_rerank = 11;
  optional int64 rank_after_rerank = 12;
  string retrieval_method = 13;
  string reason = 14;
  Citation citation = 15;
  // task-32.3 add-only: vector_score = 16 — semantic similarity provenance (0 for BM25 hits),
  // parity with v1 search proto RetrievalResult.vector_score=13. add-only field,既有 client 兼容。
  float vector_score = 16;
  // task-39.1 add-only: hybrid_score = 17 — RRF 融合分 (0 表示 semantic/BM25-only 命中),
  // parity with v1 search proto RetrievalResult.hybrid_score=15. add-only field,既有 client 兼容。
  float hybrid_score = 17;
}

message RetrievalTrace {
  string trace_id = 1;
  string query = 2;
  optional string expanded_query = 3;
  repeated string candidate_generation_steps = 4;
  int64 lexical_candidates_count = 5;
  int64 vector_candidates_count = 6;
  repeated string rerank_steps = 7;
  string scope_filter_result = 8;
  int64 final_context_count = 9;
  repeated SourceChunk retrieved_chunks = 10;  // task-11.4 真填
}

message SearchResponse {
  // Console HTTPAdapter v1.0 嵌套约定: {result, trace}
  repeated SearchResultItem results = 1;
  RetrievalTrace trace = 2;
}

// task-12.2 (ADR-017 D1 Wave 2): chunk-by-id lookup driving REST
// GET /v1/source-chunks/{id}. workspace_id is optional (Phase 12 v1.0 assumes
// chunk_id is global-unique per SqliteChunkStore schema); future multi-workspace
// strict isolation [SPEC-DEFER:phase-15.multi-workspace-strict] would require it.
message GetSourceChunkRequest {
  string chunk_id = 1;
  string workspace_id = 2;  // optional in v1
}

// task-12.3 (ADR-017 D1 Wave 2): GET /v1/search/{query_id}/trace persists each
// SearchService.Query trace in an in-memory LRU (cap 1000) keyed by query_id;
// daemon restart loses the cache [SPEC-DEFER:task-future.search-trace-sqlite-persistence] 留 v0.5.x.
message GetSearchTraceRequest {
  string query_id = 1;
  // task-33.3 (ADR-038 D3 / ADR-016 add-only): optional workspace isolation.
  // Empty = aggregate-all (backward-compatible; existing clients that omit
  // this field keep the v0.8 behavior). Non-empty restricts the lookup to the
  // given workspace so a query_id from another workspace is not returned.
  string workspace_id = 2;
}

// task-15.3 (Phase 15 P1 #3): Dashboard "已索引块" stats — total live docs +
// today_delta (chunks indexed since today_start_unix). Optional workspace_id
// for future per-workspace breakdown; v0.8 aggregates across workspaces.
message GetChunksStatsRequest {
  string workspace_id = 1;  // optional; empty = aggregate all workspaces
}

message ChunksStats {
  int64 total = 1;
  int64 today_delta = 2;
}

// task-15.5 (Phase 15 P1 #5): Dashboard "最近查询" panel — query history list
// drawn from the in-memory trace store (task-12.3). limit default 20, max 100.
message ListQueriesRequest {
  int32 limit = 1;  // 0 = default 20; clamped to [1, 100]
  // task-33.3 (ADR-038 D3 / ADR-016 add-only): optional workspace isolation.
  // Empty = aggregate-all (backward-compatible). Non-empty filters the query
  // history to the given workspace.
  string workspace_id = 2;
}

message QueryRecord {
  string query_id = 1;
  string query = 2;
  int64 ts_unix = 3;
  string workspace_id = 4;
}

message ListQueriesResponse {
  repeated QueryRecord records = 1;
}

service SearchService {
  rpc Query(SearchRequest) returns (SearchResponse);
  rpc GetSourceChunk(GetSourceChunkRequest) returns (SourceChunk);
  rpc GetSearchTrace(GetSearchTraceRequest) returns (RetrievalTrace);
  rpc GetChunksStats(GetChunksStatsRequest) returns (ChunksStats);  // task-15.3 add-only
  rpc ListQueries(ListQueriesRequest) returns (ListQueriesResponse);  // task-15.5 add-only
}

// =====================================================================
// Memory (task-13.1 / ADR-017 D1 Wave 3; mirrors contractv1.MemoryItem).
// task-17.1 / ADR-022 D1: is_pinned promoted from orthogonal store-side
// column to a first-class wire field. Add-only (field 10); ADR-015 D5
// 字段冻结 amendment 路径首次激活. Cross-repo coord: ContextForge-Console
// shipped MemoryItem.IsPinned bool add-only at master @ 415ee30 (PR #101).
// =====================================================================

message MemoryItem {
  string memory_id = 1;
  string agent_scope = 2;
  string content_preview = 3;
  string source_type = 4;
  string source_ref = 5;
  int64 created_at_unix = 6;
  int64 updated_at_unix = 7;
  int64 hit_count = 8;
  string status = 9;  // "active" | "deprecated" | "soft_deleted"
  bool is_pinned = 10;  // task-17.1 / ADR-022 D1 — pin state snapshot
  // task-27.1 / ADR-032 D1 (add-only, 推进 ADR-022 §Trade-offs 两条 marker):
  // pin-actor + pinned-at-timestamp as first-class fields (audit log does not
  // record the calling actor). pin=true writes both; unpin clears to defaults.
  string pinned_by = 11;       // 最近一次 pin 操作的调用 actor（unpin 归 ''）
  int64 pinned_at_unix = 12;   // 最近一次 pin 置真的 unix 秒（unpin 归 0）
}

message ListMemoryRequest {
  string agent_id = 1;
  string scope = 2;
  string namespace = 3;
  bool include_soft_deleted = 4;
}

message ListMemoryResponse {
  repeated MemoryItem items = 1;
}

message GetMemoryRequest {
  string memory_id = 1;
}

message PinMemoryRequest {
  string memory_id = 1;
  bool pin = 2;
  // task-40.1 / ADR-045 D1 (add-only, 推进 ADR-032 §D1 [SPEC-DEFER:phase-future.memory-actor-propagation]):
  // 调用方 actor 透传——console-api 从 X-Actor header 读取并填入；空串 → 服务端回落
  // "console-api"（默认 byte-equivalent）。认证身份（校验为已认证 auth subject）须 console-api
  // 鉴权层 [SPEC-DEFER:phase-future.memory-actor-authenticated-identity]。
  string actor = 3;
}

message PinMemoryResponse {}

message DeprecateMemoryRequest {
  string memory_id = 1;
}

message DeprecateMemoryResponse {}

message SoftDeleteMemoryRequest {
  string memory_id = 1;
}

message SoftDeleteMemoryResponse {}

// task-27.2 / ADR-032 D2 (add-only): explicit Unpin (vs the Pin{bool pin} toggle)
// + hard-delete (physical row removal vs soft-delete status flip). Existing 5
// RPC + PinMemoryRequest{bool pin} unchanged (proto-freeze guard).
message UnpinMemoryRequest {
  string memory_id = 1;
  // task-44.1 / ADR-049 D1 (add-only, unpin counterpart of PinMemoryRequest.actor=3):
  // calling actor propagation — console-api reads X-Actor header and fills it; empty
  // → server falls back to "console-api" (byte-equivalent default). Used for audit/event
  // source attribution (the unpin store path clears pinned_by, so the actor's real landing
  // point is emit_audit_and_event source, not store). Authenticated identity (verifying
  // the header against an auth subject) needs the console-api auth layer
  // [SPEC-DEFER:phase-future.memory-actor-authenticated-identity].
  string actor = 2;
}

message UnpinMemoryResponse {}

message HardDeleteMemoryRequest {
  string memory_id = 1;
}

message HardDeleteMemoryResponse {}

service MemoryService {
  rpc List(ListMemoryRequest) returns (ListMemoryResponse);
  rpc Get(GetMemoryRequest) returns (MemoryItem);
  rpc Pin(PinMemoryRequest) returns (PinMemoryResponse);
  rpc Deprecate(DeprecateMemoryRequest) returns (DeprecateMemoryResponse);
  rpc SoftDelete(SoftDeleteMemoryRequest) returns (SoftDeleteMemoryResponse);
  // task-27.2 / ADR-032 D2 (add-only RPC).
  rpc Unpin(UnpinMemoryRequest) returns (UnpinMemoryResponse);
  rpc HardDelete(HardDeleteMemoryRequest) returns (HardDeleteMemoryResponse);
}

// =====================================================================
// Eval (task-14.1 / ADR-017 D1 Wave 4; mirrors contractv1.EvalRun + EvalRunCreate + CaseResult)
// =====================================================================

message CaseResult {
  string case_id = 1;
  string query = 2;
  repeated string expected_chunks = 3;
  repeated string actual_chunks = 4;
  double score = 5;
  bool passed = 6;
}

message EvalRun {
  string eval_run_id = 1;
  string workspace_id = 2;
  string status = 3;  // "running" | "succeeded" | "failed" | "cancelled"
  string config_snapshot_json = 4;
  int64 started_at_unix = 5;
  optional int64 finished_at_unix = 6;
  string metrics_json = 7;  // serde_json::Map<String, f64>
  repeated CaseResult case_results = 8;
  string schema_version = 9;  // "v1"
  optional string dataset_ref = 10;
  optional string error_message = 11;
}

message CreateEvalRunRequest {
  string eval_run_id = 1;  // caller-provided (Go side generates uuid-like id)
  string workspace_id = 2;
  string config_snapshot_json = 3;
  string dataset_ref = 4;
}

message GetEvalRunRequest {
  string eval_run_id = 1;
}

message UpdateEvalRunProgressRequest {
  string eval_run_id = 1;
  string status = 2;
  string metrics_json = 3;
  repeated CaseResult case_results = 4;
  string error_message = 5;
}

message UpdateEvalRunProgressResponse {}

// task-15.4 (Phase 15 P1 #4): list eval runs for Console UI Eval "最近评测"
// panel. Filter is exact-match on workspace_id / status; limit clamped 1..=200
// server-side with a default of 50. ORDER BY started_at DESC.
message ListEvalRunsRequest {
  string workspace_id = 1;  // optional; empty = no constraint
  string status = 2;        // optional; "" / "running" / "succeeded" / "failed" / "cancelled"
  int32 limit = 3;          // 0 → use default (50); else clamped to [1, 200]
}

message ListEvalRunsResponse {
  repeated EvalRun runs = 1;
}

service EvalService {
  rpc Create(CreateEvalRunRequest) returns (EvalRun);
  rpc Get(GetEvalRunRequest) returns (EvalRun);
  rpc UpdateProgress(UpdateEvalRunProgressRequest) returns (UpdateEvalRunProgressResponse);
  rpc List(ListEvalRunsRequest) returns (ListEvalRunsResponse);  // task-15.4 add-only
}

// task-15.6 (Phase 15 P2 #7 / ADR-020): 5-link health detail. opt-in via Go
// REST ?detailed=true; each ComponentHealth carries a per-probe latency and
// optional error_reason. ADR-020 D2 add-only schema; ADR-020 D4 aggregation
// rule (any unreachable → 503; any degraded → 200 + degraded; else healthy).
message ComponentHealth {
  string name = 1;            // "db" | "index" | "embed" | "retriever" | "eval"
  string status = 2;          // "healthy" | "degraded" | "unreachable"
  int64 latency_ms = 3;       // milliseconds; 0 if probe did not measure
  string error_reason = 4;    // empty when status=healthy
}

message DetailedHealthRequest {}

message DetailedHealthResponse {
  string overall_status = 1;          // aggregated; healthy | degraded | unreachable
  repeated ComponentHealth components = 2;
  int64 total_latency_ms = 3;
}

service HealthService {
  rpc GetDetailed(DetailedHealthRequest) returns (DetailedHealthResponse);
}

// =====================================================================
// Events (mirrors contractv1.ObservabilityEvent)
// =====================================================================

message ObservabilityEvent {
  string event_id = 1;
  string event_type = 2;        // "indexing.progress" | "indexing.cancelled" | "indexing.error" | "core.keepalive"
  string severity = 3;          // "info" | "warn" | "error"
  string source = 4;            // "contextforge-core" | "console-api"
  string message = 5;
  int64 ts_unix = 6;
  optional string trace_id = 7;
  optional string job_id = 8;
  // Optional structured payload (JSON-serialized):
  //   indexing.progress → {processed_files, total_files}
  //   indexing.error → {error_message}
  string payload_json = 9;
}

message SubscribeEventsRequest {
  optional string job_id = 1;   // optional filter
  optional string workspace_id = 2;
  // task-26.2 / ADR-031 D4 (add-only): replay missed memory state-op events
  // from the persistent audit_log before splicing the live broadcast stream.
  // since_ts = replay events at/after this unix-second cutoff (0 = no replay);
  // last_event_id = client's last-seen SSE id for boundary dedup (advisory).
  // Existing subscribers (job_id/workspace_id only) are unaffected.
  int64 since_ts = 3;
  string last_event_id = 4;
}

service EventsService {
  rpc Subscribe(SubscribeEventsRequest) returns (stream ObservabilityEvent);
}
