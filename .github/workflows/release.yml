name: Release — push image to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to build/push (e.g. v0.9.0-rc1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write       # Sigstore OIDC token for keyless attestation signing (task-28.2)
  attestations: write   # write signed provenance + SBOM to the GitHub attestation store

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/contextforge-daemon
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "ref=refs/tags/${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF##refs/tags/}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Supply-chain attestations (task-28.2): signed SLSA provenance + SPDX SBOM,
      # bound to the pushed manifest digest, stored in the GitHub attestation store +
      # GHCR OCI referrer. Verified downstream via `gh attestation verify` (verify-image.yml).
      - name: Attest build provenance (signed SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM (SPDX-JSON) from pushed image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM (signed)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Image summary
        run: |
          echo "✅ Pushed:" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull command:" >> $GITHUB_STEP_SUMMARY
          echo '  `docker pull ghcr.io/${{ github.repository_owner }}/contextforge-daemon:${{ steps.ref.outputs.tag }}`' >> $GITHUB_STEP_SUMMARY
