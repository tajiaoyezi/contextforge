name: Release — push image to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to build/push (e.g. v0.9.0-rc1)'
        required: true
        type: string

permissions:
  contents: write      # create GitHub Release object (task-46.3) + push image artifacts
  packages: write       # push image + cosign signature/attestation OCI artifacts to GHCR
  id-token: write       # Sigstore OIDC token for keyless cosign signing (task-28.2)

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/contextforge-daemon
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "ref=refs/tags/${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF##refs/tags/}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max          # SLSA build provenance attached to the image index
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Supply-chain proof (task-28.2): keyless cosign signature + signed SPDX SBOM
      # attestation, both bound to the pushed manifest DIGEST and stored as OCI artifacts in
      # GHCR (Sigstore Fulcio cert + Rekor log; independent of repo visibility). Verified
      # downstream by cosign in verify-image.yml.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless, by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_NAME}@${DIGEST}"

      - name: Generate SBOM (SPDX-JSON) from pushed image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM (keyless cosign attestation)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE_NAME}@${DIGEST}"

      - name: Image summary
        run: |
          echo "✅ Pushed:" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull command:" >> $GITHUB_STEP_SUMMARY
          echo '  `docker pull ghcr.io/${{ github.repository_owner }}/contextforge-daemon:${{ steps.ref.outputs.tag }}`' >> $GITHUB_STEP_SUMMARY

      # --- GitHub Release object (task-46.3 / ADR-050 D4): auto-create a Release on every
      # v* tag push, with body extracted from RELEASE_NOTES.md (the version's section) +
      # signed-image / SBOM / provenance references. Uses softprops/action-gh-release@v2.
      - name: Extract release notes body
        id: notes
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          # Extract the "## <tag>" section from RELEASE_NOTES.md (from the matching heading
          # to the next "## v" heading or EOF). Falls back to CHANGELOG.md if not found.
          BODY=""
          if [ -f RELEASE_NOTES.md ]; then
            BODY=$(awk -v tag="## ${TAG}" '
              $0 ~ "^"tag"($| )" { in_sec=1; next }
              in_sec && /^## v[0-9]/ { in_sec=0 }
              in_sec { print }
            ' RELEASE_NOTES.md)
          fi
          if [ -z "$BODY" ] && [ -f CHANGELOG.md ]; then
            BODY=$(awk -v tag="\\[${TAG}\\]" '
              $0 ~ "^## "tag"($| )" { in_sec=1; next }
              in_sec && /^## \[v[0-9]/ { in_sec=0 }
              in_sec { print }
            ' CHANGELOG.md)
          fi
          # Append supply-chain footer (real digest filled at run time).
          DIGEST="${{ steps.build.outputs.digest }}"
          FOOTER=$(printf '\n\n---\n\n**Signed image:** `%s@%s`\n\nVerify: `cosign verify --yes %s@%s`\n\nSPDX SBOM + SLSA provenance attached as OCI artifacts (cosign attest). See `docs/deploy/production.md` §2.\n' "$IMAGE_NAME" "$DIGEST" "$IMAGE_NAME" "$DIGEST")
          printf '%s\n%s\n' "$BODY" "$FOOTER" > /tmp/release_body.md
          echo "wrote $(wc -l < /tmp/release_body.md) lines to release body"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          name: ${{ steps.ref.outputs.tag }}
          body_path: /tmp/release_body.md
          draft: false
          prerelease: ${{ contains(steps.ref.outputs.tag, '-') }}
          generate_release_notes: false

