name: "[TEMP] confirm fixed cosign verify (resolve digest from tag → verify by digest)"

# TEMPORARY confirmation for the verify-image.yml fix: mirror the FIXED step exactly —
# resolve the digest FROM THE TAG (as verify-image.yml does), then cosign verify + verify-
# attestation by digest with timeout. Proves the resolve-from-tag → verify-by-digest chain
# works end-to-end against the real signed v0.21.0 image. Removed before merge.

on:
  push:
    branches:
      - fix/verify-image-cosign-verify
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  confirm:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/contextforge-daemon:v0.21.0
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify (resolve digest from tag → verify by digest) — mirrors verify-image.yml fix
        run: |
          set -euo pipefail
          IDENTITY="^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@.*$"
          ISSUER="https://token.actions.githubusercontent.com"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')
          REF="ghcr.io/${{ github.repository_owner }}/contextforge-daemon@${DIGEST}"
          echo "resolved $IMAGE -> $REF"
          echo "::group::cosign verify"
          timeout 180 cosign verify "$REF" \
            --certificate-identity-regexp "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" -o text
          echo "::endgroup::"
          echo "::group::cosign verify-attestation (spdxjson)"
          timeout 180 cosign verify-attestation --type spdxjson "$REF" \
            --certificate-identity-regexp "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" -o text >/dev/null
          echo "::endgroup::"
          echo "✅ resolve-from-tag → verify-by-digest chain OK (digest ${DIGEST})"
