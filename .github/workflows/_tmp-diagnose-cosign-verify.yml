name: "[TEMP] diagnose cosign verify hang (fix/verify-image)"

# TEMPORARY diagnostic for the verify-image.yml cosign-verify hang (task-28.2 follow-up).
# Tests multiple hypotheses against the REAL signed v0.21.0 GHCR image, each timeout-bounded +
# continue-on-error so all run in one pass. Read-only (verify only; no push). Removed before merge.

on:
  push:
    branches:
      - fix/verify-image-cosign-verify
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      REPO: ${{ github.repository }}
      DIGEST_REF: ghcr.io/${{ github.repository_owner }}/contextforge-daemon@sha256:f2cb3aadd5608a42e247aad562cb64f1c260dee1a5f4909c862e6484044d1e46
      IDENTITY: ^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@.*$
      ISSUER: https://token.actions.githubusercontent.com
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign version
        run: cosign version

      - name: A — cosign verify by digest (plain, timeout 120)
        continue-on-error: true
        run: |
          set -x
          timeout 120 cosign verify "$DIGEST_REF" \
            --certificate-identity-regexp "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" -o text
          echo "A exit=$?"

      - name: B — cosign verify --insecure-ignore-tlog (timeout 120) [tests if Rekor is the hang]
        continue-on-error: true
        run: |
          set -x
          timeout 120 cosign verify "$DIGEST_REF" \
            --insecure-ignore-tlog=true \
            --certificate-identity-regexp "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" -o text
          echo "B exit=$?"

      - name: C — cosign verify --private-infrastructure / offline tlog? (timeout 120) [tries --offline]
        continue-on-error: true
        run: |
          set -x
          timeout 120 cosign verify "$DIGEST_REF" \
            --offline=true \
            --certificate-identity-regexp "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" -o text
          echo "C exit=$?"

      - name: D — cosign verify-attestation spdxjson (timeout 120)
        continue-on-error: true
        run: |
          set -x
          timeout 120 cosign verify-attestation --type spdxjson "$DIGEST_REF" \
            --certificate-identity-regexp "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" -o text | head -c 400
          echo ""
          echo "D done"

      - name: E — does the .sig exist? (crane/cosign triangulate)
        continue-on-error: true
        run: |
          set -x
          timeout 60 cosign triangulate "$DIGEST_REF" || echo "triangulate exit=$?"
