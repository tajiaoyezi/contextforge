name: CI — test + lint

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  cargo-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93'
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo test
        run: cargo test --workspace

  go-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: go test
        run: go test ./...

  spec-lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git diff against origin/master
      - name: spec drift lint --touched
        run: bash scripts/spec_drift_lint.sh --touched origin/master

  # task-28.3 (Phase 28): strict code lint gate — clippy + gofmt + go vet, all blocking.
  # Backlog (CI/LF authoritative — local Windows CRLF masked the real gofmt count):
  # gofmt 15 files / go vet 0 / clippy ~33 — all fixed in task-28.3 before turning red.
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93'
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: gofmt check
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt — these files need formatting:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
          echo "gofmt clean"
      - name: go vet
        run: go vet ./...

  # Audit follow-up (v0.28.0 review, finding BUILD-4): the default build is
  # 0-vector-dep, and CI previously built ONLY that default profile — every
  # optional vector/embedding backend was off-by-default AND untested in CI,
  # resting entirely on single-dev-box spikes. This matrix build-checks each
  # optional feature on Linux (compile + link, NO tests). lancedb's full test
  # targets hit a pre-existing rustc ICE (finding BUILD-5) so we build-check it,
  # not test it — `cargo build` is exactly the right scope here. fail-fast:false
  # so one feature's failure never masks the others. vector-spike is omitted
  # (inert empty feature == default build, no signal).
  feature-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        feature:
          - vector-sqlite
          - vector-qdrant
          - vector-lancedb
          - vector-hnsw
          - embedding-fastembed
          - reranker-fastembed
          - embedding-remote
          - cjk-segmenter
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93'
      - name: Install protoc (lancedb build.rs needs a system protoc)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-feat-${{ matrix.feature }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo build --features ${{ matrix.feature }}
        run: cargo build -p contextforge-core --features ${{ matrix.feature }}
