name: "[TEMP] task-28.1 anon-pull validation"

# TEMPORARY validation workflow for task-28.1 (Phase 28). NOT a permanent CI guard.
# The multi-arch build path was already validated as INFEASIBLE via emulation
# (run 26757640892 cancelled at 45min, arm64 still compiling Rust deps) → arm64
# deferred to a native runner. This residual run validates ONLY the anonymous
# (logged-out) pull guard against the current public :latest. Removed before merge.

on:
  push:
    branches:
      - task/task-28.1-multi-arch-image-and-anonymous-pull
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    env:
      LATEST_IMAGE: ghcr.io/${{ github.repository_owner }}/contextforge-daemon:latest
    steps:
      - name: Anonymous (logged-out) pull of public :latest
        run: |
          set -euo pipefail
          docker logout ghcr.io || true
          echo "Anonymous pull of $LATEST_IMAGE ..."
          docker pull "$LATEST_IMAGE"
          echo "✅ anonymous pull of :latest succeeded — public pullability confirmed"
