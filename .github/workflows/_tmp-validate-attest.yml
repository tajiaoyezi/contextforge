name: "[TEMP] task-28.2 cosign sign/attest validation (local registry)"

# TEMPORARY validation for task-28.2. NOT a permanent guard. Proves the cosign keyless
# supply-chain mechanism (cosign sign + cosign attest SBOM + cosign verify +
# cosign verify-attestation) end-to-end against a LOCAL registry + tiny test image —
# WITHOUT any outward-facing GHCR push and without the ~20min real Rust build.
# (GitHub-native attestation was blocked: actions/attest-* not available on user-owned
# PRIVATE repos — run 26789731232 failure. cosign uses public Sigstore + GHCR OCI artifacts,
# independent of repo visibility.) Removed before merge.

on:
  push:
    branches:
      - task/task-28.2-image-signing-sbom-provenance
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write       # Sigstore OIDC (keyless cosign signing)

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    env:
      IMAGE: localhost:5000/cf-attest-test
    steps:
      - name: Set up Buildx (host network → reach localhost:5000 service)
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build + push tiny test image to local registry
        id: build
        run: |
          set -euo pipefail
          printf 'FROM alpine:3.20\nCMD ["true"]\n' > Dockerfile.attest-test
          docker buildx build --push \
            -t "${IMAGE}:v0" \
            -f Dockerfile.attest-test \
            --metadata-file /tmp/meta.json \
            .
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "built ${IMAGE}@${DIGEST}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign sign (keyless, local registry)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes --allow-insecure-registry "${IMAGE}@${DIGEST}"

      - name: SBOM (syft SPDX) + cosign attest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE}@${DIGEST}"           # localhost → docker treats as insecure by default
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft "docker:${IMAGE}@${DIGEST}" -o spdx-json=sbom.spdx.json
          cosign attest --yes --allow-insecure-registry --type spdxjson \
            --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"

      - name: cosign verify + verify-attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          ID="^https://github.com/${{ github.repository }}/\.github/workflows/.*$"
          ISS="https://token.actions.githubusercontent.com"
          echo "::group::cosign verify"
          cosign verify --allow-insecure-registry "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "$ID" --certificate-oidc-issuer "$ISS"
          echo "::endgroup::"
          echo "::group::cosign verify-attestation (spdxjson)"
          cosign verify-attestation --allow-insecure-registry --type spdxjson "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "$ID" --certificate-oidc-issuer "$ISS"
          echo "::endgroup::"
          echo "✅ cosign sign + SBOM attest + verify + verify-attestation OK (local registry)"
